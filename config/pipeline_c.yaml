training:
  # 支持的模型变体: n (Nano), s (Small), m (Medium), l (Large)
  model_variant: "m"
  pretrain_weights: "models/pipeline_c_rfdetr_medium_best_ema.pth"
  resolution: 512
  epochs: 30
  batch_size: 4
  grad_accum_steps: 4
  lr: 0.0001
  lr_encoder: 0.00001
  weight_decay: 0.0001
  use_ema: true
  early_stopping: true
  early_stopping_patience: 10
  gradient_checkpointing: false
  dataset: "dataset/batch1_coco_p03"
  device: "auto"
  output_dir: "runs/pipeline_c"

slicer:
  enabled: true
  slice_size: 640
  overlap: 0.25
  min_area_ratio: 0.3
  negative_sample_ratio: 0.2

nms:
  enabled: true
  iou_threshold: 0.5

augmentation:
  enabled: true
  preset: "AUG_INDUSTRIAL"
  custom: {}
